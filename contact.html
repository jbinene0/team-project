<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me</title>
  <link rel="stylesheet" href="css/contact.css" />
</head>

<body>

  <header class="header">
    <div class="logo-container">
      <img src="images/image.png" alt="OSHA App Logo" class="logo" />
    </div>

    <nav class="nav-tabs">
      <a href="index.html">Home</a>
      <a href="aboutme.html">About Me</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>

    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
      <span class="hamburger-label">Menu</span>
      <div class="hamburger-bars">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </button>
  </header>

  <main class="contact-main">
    <div class="contact-content">

      <h1>Contact Me</h1>
      <p class="contact-intro">
        Available for safety roles, compliance support, or training.
      </p>

      <div class="contact-grid">

        <section class="contact-form-section">
          <h2>Send a Message</h2>

          <div id="form-message"></div>

          <p class="required-note"><span class="required">*</span> Required fields</p>
          <form class="contact-form" id="contactForm" novalidate>

            <label for="name">Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" placeholder="Your full name" required>
            <span class="field-error" id="name-error"></span>

            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
            <span class="field-error" id="email-error"></span>

            <label for="message">Message <span class="required">*</span></label>
            <textarea id="message" name="message" placeholder="Write your message here (min. 20 characters)..." required></textarea>
            <span class="field-error" id="message-error"></span>

            <button type="submit">Submit</button>
          </form>
        </section>

        <aside class="direct-contact">
          <h2>Direct Contact</h2>
          <p><a href="mailto:lonpierre25@gmail.com">lonpierre25@gmail.com</a></p>
          <p><a href="https://www.linkedin.com/" target="_blank">LinkedIn</a></p>
        </aside>

      </div>
    </div>
  </main>

  <footer class="footer">
    <p>lonpierre25@gmail.com | © 2026 Pierre Lono</p>
  </footer>

  <script type="module" src="js/contact.js"></script>

</body>
</html>
