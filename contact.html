<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me</title>
  <link rel="stylesheet" href="css/contact.css" />
</head>

<body>

  <header class="header">
    <div class="logo-container">
      <img src="images/image.png" alt="OSHA App Logo" class="logo" />
    </div>

    <nav class="nav-tabs">
      <a href="index.html">Home</a>
      <a href="aboutme.html">About Me</a>
      <a href="#">Projects</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <main class="contact-main">
    <div class="contact-content">
      
      <h1>Contact Me</h1>
      <p class="contact-intro">
        Available for safety roles, compliance support, or training.
      </p>

      <div class="contact-grid">

        <section class="contact-form-section">
          <h2>Send a Message</h2>

          <div id="form-message"></div>

          <form class="contact-form" id="contactForm">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>

            <button type="submit">Submit</button>
          </form>
        </section>

        <aside class="direct-contact">
          <h2>Direct Contact</h2>
          <p><a href="mailto:lonpierre25@gmail.com">lonpierre25@gmail.com</a></p>
          <p><a href="https://www.linkedin.com/" target="_blank">LinkedIn</a></p>
        </aside>

      </div>
    </div>
  </main>

  <footer class="footer">
    <p>lonpierre25@gmail.com | © 2026 Pierre Lono</p>
  </footer>
  <script type="module" src="js/contact.js"></script>

</body>
</html>
